services:
  # Tailwind CSS ビルド用サービス
  tailwind:
    image: node:22-alpine
    container_name: tailwind_builder
    working_dir: /app
    tty: true
    volumes:
      - .:/app
    # 修正ポイント: --poll オプションの追加 ＋ 出力先パスの統一
    command: npm run dev

  # Nginx Webサーバー用サービス
  frontend:
    image: nginx:alpine
    container_name: weather_frontend
    ports:
      - "8080:80"
    volumes:
      - .:/usr/share/nginx/html
    depends_on:
      - tailwind