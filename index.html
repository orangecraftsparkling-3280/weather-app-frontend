<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather Station</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body
    id="app-body"
    class="bg-gradient-to-br from-blue-100 to-indigo-200 min-h-screen flex items-center justify-center p-4 transition-all duration-1000"
  >
    <div
      class="w-full max-w-4xl bg-white/20 backdrop-blur-xl rounded-[2rem] shadow-2xl p-8 space-y-8 border border-white/50"
    >
      <!-- ヘッダー・操作エリア -->
      <div
        class="flex flex-col md:flex-row md:items-center justify-between gap-4"
      >
        <div>
          <h1 class="text-2xl font-extrabold text-slate-800 tracking-tight">
            Weather Station
          </h1>
          <div
            id="current-location-display"
            class="flex items-center text-blue-700 font-bold text-xs bg-blue-500/10 px-3 py-1 rounded-full w-fit mt-1"
          >
            📍 <span id="location-name">場所を選択してください</span>
          </div>
        </div>
        <div
          class="flex items-center gap-2 bg-white/40 p-2 rounded-2xl border border-white/50 w-full md:w-auto"
        >
          <select
            id="location-select"
            class="flex-1 p-3 bg-transparent border-none outline-none text-slate-800 font-bold cursor-pointer"
          >
            <option value="">場所を選択...</option>
          </select>
          <button
            id="geo-btn"
            class="bg-blue-600 text-white px-5 py-3 rounded-xl font-bold hover:bg-blue-700 transition-all active:scale-95 shadow-lg shadow-blue-500/30 text-sm whitespace-nowrap"
          >
            📍 現在地
          </button>
        </div>
      </div>

      <!-- メインコンテンツ：2カラム -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <!-- 左：現在データ -->
        <div class="space-y-6">
          <div class="text-center py-2">
            <div
              id="weather"
              class="text-sm font-bold text-blue-600 uppercase tracking-widest mb-2"
            >
              --
            </div>
            <div class="flex flex-row items-center justify-center gap-4">
              <div id="weather-icon" class="text-6xl"></div>
              <div
                id="temperature"
                class="text-8xl font-black text-slate-900 tracking-tighter"
              >
                --°C
              </div>
            </div>
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div
              class="bg-white/40 p-4 rounded-2xl border border-white/50 text-center"
            >
              <div
                class="text-[10px] uppercase text-slate-500 font-bold tracking-wider mb-1"
              >
                湿度
              </div>
              <div id="humidity" class="font-bold text-slate-800">-</div>
            </div>
            <div
              class="bg-white/40 p-4 rounded-2xl border border-white/50 text-center"
            >
              <div
                class="text-[10px] uppercase text-slate-500 font-bold tracking-wider mb-1"
              >
                体感
              </div>
              <div id="apparent-temp" class="font-bold text-slate-800">-</div>
            </div>
            <div
              class="bg-white/40 p-4 rounded-2xl border border-white/50 col-span-2 text-center"
            >
              <div
                class="text-[10px] uppercase text-slate-500 font-bold tracking-wider mb-1"
              >
                風速
              </div>
              <div id="wind-speed" class="font-bold text-slate-800">-</div>
            </div>
          </div>
        </div>

        <!-- 右：週間予報 -->
        <div class="md:border-l border-white/30 md:pl-8">
          <h3 class="font-bold text-slate-700 mb-4">週間予報</h3>
          <div id="forecast-list" class="space-y-2"></div>
        </div>
      </div>
    </div>
    <script src="locations.js"></script>
    <script src="app.js"></script>
  </body>
</html>
