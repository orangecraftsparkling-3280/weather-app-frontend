<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>天気予報ステーション</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=" />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">
    <div
      class="w-full max-w-sm bg-white rounded-2xl shadow-xl p-6 space-y-6 border border-slate-100"
    >
      <h1 class="text-xl font-bold text-slate-800">天気予報ステーション</h1>

      <select
        id="location-select"
        class="w-full p-3 border border-slate-200 rounded-xl bg-slate-50 focus:ring-2 focus:ring-slate-400 outline-none transition-all"
      ></select>
      <div class="location-selector">
        <!-- 追加: 現在地を取得するボタン -->
        <button id="geo-btn" class="w-full bg-slate-800 text-white py-3 rounded-xl font-bold hover:bg-slate-900 transition-all active:scale-95 shadow-lg">
          📍 現在地から取得
        </button>
      </div>

      <div class="grid grid-cols-2 gap-4 text-sm">
        <div class="flex justify-between border-b pb-2">
          <span class="text-slate-500">天気</span
          ><span id="weather" class="font-bold text-slate-700">-</span>
        </div>
        <div class="flex justify-between border-b pb-2">
          <span class="text-slate-500">気温</span
          ><span id="temperature" class="font-bold text-slate-700">-</span>
        </div>
        <div class="flex justify-between border-b pb-2">
          <span class="text-slate-500">湿度</span><br />
          <span id="humidity" class="font-bold text-slate-700">-</span>
        </div>
        <div class="flex justify-between border-b pb-2">
          <span class="text-slate-500">体感温度</span><br />
          <span id="apparent-temp" class="font-bold text-slate-700">-</span>
        </div>
        <div class="flex justify-between border-b pb-2">
          <span class="text-slate-500">風速</span><br />
          <span id="wind-speed" class="font-bold text-slate-700">-</span>
        </div>
      </div>

      <button
        id="fetch-btn"
        class="w-full bg-slate-800 text-white py-3 rounded-xl font-bold hover:bg-slate-900 transition-all active:scale-95 shadow-lg"
      >
        最新の情報を取得
      </button>
    </div>

    <!-- 読み込み順序を厳守 -->
    <script src="locations.js"></script>
    <script src="app.js"></script>
  </body>
</html>
